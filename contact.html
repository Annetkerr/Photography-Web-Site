<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Anne Kerr Photography</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="contact-page">

  <!-- Full-bleed background photo
       Replace images/contact-bg.jpg with your chosen image. -->
  <div class="contact-bg">
    <img src="images/contact-bg.jpg" alt="" aria-hidden="true" />
  </div>

  <!-- NAV: white background on inner pages -->
  <nav class="nav-page">
    <a class="nav-brand" href="index.html">Anne Kerr Photography</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <!-- CONTACT FORM
       To make this form send real emails from your static site, sign up free at formspree.io,
       create a form, then replace YOUR_FORM_ID below with the ID they give you.
       Example: action="https://formspree.io/f/abcdefgh" -->
  <main class="contact-main">
    <div class="contact-card">
      <h2>Get in Touch</h2>
      <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

        <div class="form-group">
          <label for="name">Name *</label>
          <input type="text" id="name" name="name" required autocomplete="name" />
        </div>

        <div class="form-group">
          <label for="email">Email Address *</label>
          <input type="email" id="email" name="email" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label for="message">Message *</label>
          <textarea id="message" name="message" required></textarea>
        </div>

        <div class="form-submit">
          <button type="submit" class="btn-send">Send Message</button>
        </div>

      </form>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <span>© 2026 Anne Kerr Photography</span>
    <a href="https://www.instagram.com/annetkerr/" target="_blank" class="footer-instagram" aria-label="Instagram">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
      </svg>
    </a>
  </footer>

</body>
</html>
