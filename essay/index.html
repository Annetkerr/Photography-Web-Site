<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Essay — Anne Kerr Photography</title>

  <!-- Redirect to Adobe Express photo essay -->
  <meta http-equiv="refresh" content="1; url=https://new.express.adobe.com/webpage/jSNy2kYH9xELf" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Raleway:wght@300;400&display=swap" />

  <style>
    :root {
      --font-heading: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Raleway', sans-serif;
      --color-text: #333;
      --color-muted: #888;
      --color-accent: #b09090;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: var(--font-body);
      font-weight: 300;
      color: var(--color-text);
      background: #fff;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .brand {
      font-family: var(--font-heading);
      font-weight: 300;
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 3rem;
    }

    h1 {
      font-family: var(--font-heading);
      font-weight: 300;
      font-size: 2.2rem;
      letter-spacing: 0.04em;
      margin-bottom: 1rem;
    }

    p {
      font-size: 0.9rem;
      color: var(--color-muted);
      letter-spacing: 0.06em;
      margin-bottom: 2.5rem;
    }

    .direct-link {
      display: inline-block;
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--color-accent);
      border-bottom: 1px solid var(--color-accent);
      padding-bottom: 2px;
      text-decoration: none;
      transition: color 0.2s;
    }

    .direct-link:hover { color: var(--color-text); border-color: var(--color-text); }

    .back-link {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: var(--color-muted);
      text-decoration: none;
    }

    .back-link:hover { color: var(--color-text); }
  </style>
</head>
<body>

  <div class="brand">Anne Kerr Photography</div>

  <h1>Opening Photo Essay</h1>
  <p>You will be redirected momentarily&hellip;</p>

  <a class="direct-link" href="https://new.express.adobe.com/webpage/jSNy2kYH9xELf">
    Open essay directly &rarr;
  </a>

  <a class="back-link" href="../index.html">&larr; Back to portfolio</a>

  <script>
    // Immediate JS redirect as primary method; meta refresh above is the fallback
    window.location.replace("https://new.express.adobe.com/webpage/jSNy2kYH9xELf");
  </script>

</body>
</html>
